syntax = "proto3";

option java_multiple_files = true;

package anki.speedrun;

import "anki/generic.proto";

// Speedrun's diagnostic evidence service. Records exam-style/SRS attempts,
// classifies misses into a root-cause failure mode (deterministically, with no
// AI), reads back the evidence for a card, and computes the three separate
// scores (memory, performance, readiness).
service SpeedrunService {
  rpc RecordAttempt(RecordAttemptRequest) returns (RecordAttemptResponse);
  rpc GetAttemptsForCard(GetAttemptsForCardRequest) returns (SrAttempts);
  rpc ClassifyAttempt(ClassifyAttemptRequest) returns (Diagnosis);
  // Recompute the readiness snapshot from raw evidence and cache it.
  rpc ComputeReadiness(generic.Empty) returns (ReadinessSnapshot);
  // Return the latest cached snapshot (computing one if none exists yet).
  rpc GetReadinessSnapshot(generic.Empty) returns (ReadinessSnapshot);
  // Register a held-out exam-style question (paraphrase test bank).
  rpc AddQuestionItem(QuestionItem) returns (QuestionItemId);
  rpc GetQuestionItemsForCard(GetQuestionItemsForCardRequest)
      returns (QuestionItems);
  // Recall-vs-performance gap over cards with exam-style attempts.
  rpc GetPerformanceReport(generic.Empty) returns (PerformanceReport);
  // Topic outline / coverage map.
  rpc SetTopicMap(TopicMap) returns (SetTopicMapResponse);
  rpc GetTopicMap(generic.Empty) returns (TopicMap);
  // Load the built-in MCAT foundational-concept starter outline.
  rpc SeedMcatTopicOutline(generic.Empty) returns (SetTopicMapResponse);
  // How much of the outline the deck covers (a topic is covered if a note is
  // tagged with it).
  rpc GetCoverageReport(generic.Empty) returns (CoverageReport);
  // Calibration (Brier/log-loss) of captured predictions vs actual outcomes.
  rpc GetCalibrationReport(generic.Empty) returns (CalibrationReport);
  // Card ids in study order for a deck, honoring the SpeedrunPointsAtStake
  // toggle. Used by the ablation harness (toggle ON vs OFF).
  rpc GetReviewOrder(GetReviewOrderRequest) returns (ReviewOrder);
  // Exam-anchored scheduling: exam date + target score, and the derived plan.
  rpc SetExamProfile(ExamProfile) returns (ExamProfile);
  rpc GetExamProfile(generic.Empty) returns (ExamProfile);
  rpc GetExamPlan(generic.Empty) returns (ExamPlan);
  // Paraphrase-test integrity: held-out items that duplicate a study card's
  // text.
  rpc GetLeakageReport(generic.Empty) returns (LeakageReport);
  // Concept-linked practice: held-out questions for a (weak) topic.
  rpc GetRoutedPractice(GetRoutedPracticeRequest) returns (QuestionItems);
  // Let the student correct a diagnosis / advance the routed action lifecycle.
  rpc UpdateAttemptDiagnosis(UpdateAttemptDiagnosisRequest)
      returns (generic.Empty);
  rpc SetActionStatus(SetActionStatusRequest) returns (generic.Empty);
  // Fetch a batch of held-out questions for a practice session (optionally
  // filtered to one topic). Appended last to keep existing method indices
  // stable.
  rpc GetPracticeQuestions(GetPracticeQuestionsRequest) returns (QuestionItems);
  // Woven memory->reasoning: after a review session, pick held-out questions
  // for the concepts just reviewed (card-linked, then topic-matched, then
  // unseen). Appended last to keep existing method indices stable.
  rpc GetSessionReasoningRound(SessionReasoningRoundRequest)
      returns (QuestionItems);
  // Engine-anchored reasoning-due queue (Design 2 / D1): rank topics by
  // reasoning debt (recall-vs-performance gap + uncovered + recency) and return
  // held-out questions for the most-due topics. Appended last for index
  // stability.
  rpc GetDueReasoning(GetDueReasoningRequest) returns (QuestionItems);
  // End-of-session / periodic feedback report (Design 2 / D2): counts by
  // diagnosis kind + weakest topics over exam-style attempts.
  rpc GetFeedbackReport(generic.Empty) returns (FeedbackReport);
  // Per-topic counts of held-out questions in the bank, for the Practice
  // landing (MCAT section / subject cards). Appended last for index stability.
  rpc GetPracticeBankSummary(generic.Empty) returns (PracticeBankSummary);
  // Demo/sample seeding: mark existing cards as mature review cards and record
  // a batch of exam-style + SRS attempts (with predictions), so the three
  // scores and calibration populate immediately for a demo without waiting
  // weeks for real intervals to mature. The score is still COMPUTED from this
  // seeded history, never hand-set. Appended last for index stability.
  rpc SeedSampleHistory(SeedSampleHistoryRequest)
      returns (SeedSampleHistoryResponse);
  // Per-topic signal breakdown for the topic-centric dashboard: coverage plus
  // the raw counts behind the memory signal (mature/review cards tagged to the
  // topic) and the performance signal (exam-style attempts whose card is tagged
  // to the topic). Fractions + per-topic sufficiency are derived in the
  // presentation layer from these counts, mirroring the global signals.
  // Appended last to keep existing method indices stable.
  rpc GetTopicSignals(generic.Empty) returns (TopicSignalsReport);
}

// Backend counterpart. The methods above are implemented on Collection and are
// implicitly delegated to the Backend, so this service is intentionally empty.
service BackendSpeedrunService {}

// Signals used by the deterministic classifier. Kept as scalars (not enums) so
// the generated bindings stay simple.
message ClassifyAttemptRequest {
  bool correct = 1;
  uint32 took_ms = 2;
  bool recall_failed = 3;
  bool passage_evidence_missed = 4;
  // 0=srs review, 1=passage mcq, 2=discrete mcq
  uint32 question_type = 5;
}

// kind: 0=none,1=memory,2=reasoning,3=passage,4=test_taking,5=correct
// routed_action: 0=none,1=resurface,2=passage_practice,3=strategy,4=advance
message Diagnosis {
  uint32 kind = 1;
  float confidence = 2;
  uint32 routed_action = 3;
}

message RecordAttemptRequest {
  int64 card_id = 1;
  int64 note_id = 2;
  string session_id = 3;
  int64 answered_at_ms = 4;
  uint32 took_ms = 5;
  uint32 question_type = 6;
  optional int32 selected = 7;
  bool correct = 8;
  ClassifyAttemptRequest signals = 9;
  string data = 10;
  // optional pre-answer predicted probability of a correct outcome (0..1),
  // used for calibration
  optional float predicted = 11;
}

message RecordAttemptResponse {
  int64 id = 1;
  Diagnosis diagnosis = 2;
}

message SrAttempt {
  int64 id = 1;
  int64 card_id = 2;
  int64 note_id = 3;
  bool correct = 4;
  uint32 diagnosis_kind = 5;
  float diagnosis_confidence = 6;
  uint32 routed_action = 7;
  int64 answered_at_ms = 8;
}

message GetAttemptsForCardRequest {
  int64 card_id = 1;
}

// A held-out exam-style question paraphrasing a source card's concept.
message QuestionItem {
  int64 id = 1;
  // Source card this question paraphrases (0 = none).
  int64 card_id = 2;
  string topic = 3;
  // 0=hand_authored, 1=open_licensed, 2=ai_generated
  uint32 provenance = 4;
  string payload = 5;
}

message QuestionItems {
  repeated QuestionItem items = 1;
}

// One row of the practice bank summary: how many held-out questions carry a
// given subject topic tag.
message PracticeBankTopicCount {
  string topic = 1;
  uint32 count = 2;
}

// Per-topic counts of the whole question bank, so the Practice landing can show
// real question counts per MCAT section / subject without loading every row.
message PracticeBankSummary {
  uint32 total = 1;
  repeated PracticeBankTopicCount topics = 2;
}

message QuestionItemId {
  int64 id = 1;
}

message GetQuestionItemsForCardRequest {
  int64 card_id = 1;
}

message GetRoutedPracticeRequest {
  string topic = 1;
}

message GetPracticeQuestionsRequest {
  // Max questions to return.
  uint32 limit = 1;
  // Optional topic filter; empty = any topic.
  string topic = 2;
}

message SessionReasoningRoundRequest {
  // Card ids reviewed in the session that just finished.
  repeated int64 reviewed_card_ids = 1;
  // Max questions in the round; 0 => default (5).
  uint32 limit = 2;
}

message GetDueReasoningRequest {
  // Max questions to return; 0 => default (5).
  uint32 limit = 1;
}

// Aggregated end-of-session / periodic feedback report over exam-style
// attempts.
message FeedbackReport {
  uint32 total = 1;
  uint32 correct = 2;
  uint32 memory_misses = 3;
  uint32 reasoning_misses = 4;
  uint32 passage_misses = 5;
  uint32 test_taking_misses = 6;
  // Topics with at least one miss, ordered weakest (most misses) first.
  repeated string weak_topics = 7;
}

// routed_action: 0=none,1=resurface,2=passage_practice,3=strategy,4=advance
message UpdateAttemptDiagnosisRequest {
  int64 attempt_id = 1;
  uint32 diagnosis_kind = 2;
  uint32 routed_action = 3;
}

// action_status: 0=pending,1=accepted,2=dismissed,3=completed
message SetActionStatusRequest {
  int64 attempt_id = 1;
  uint32 action_status = 2;
}

// Recall (SRS mature proxy) vs performance (exam-style accuracy) over source
// cards that have exam-style attempts. A positive gap means recall outruns
// application - the memory-to-application bridge is weak.
message PerformanceReport {
  uint32 cards_evaluated = 1;
  uint32 exam_attempts = 2;
  float recall_rate = 3;
  float performance_rate = 4;
  float recall_perf_gap = 5;
  bool sufficient = 6;
  string note = 7;
  uint32 question_items = 8;
}

message TopicMapEntry {
  string topic = 1;
  string label = 2;
  float weight = 3;
}

message TopicMap {
  repeated TopicMapEntry entries = 1;
}

message SetTopicMapResponse {
  uint32 topics = 1;
}

message TopicCoverage {
  string topic = 1;
  string label = 2;
  float weight = 3;
  uint32 cards = 4;
  bool covered = 5;
}

message CoverageReport {
  uint32 topics_total = 1;
  uint32 topics_covered = 2;
  float coverage = 3;
  float weighted_coverage = 4;
  repeated TopicCoverage topics = 5;
}

message GetReviewOrderRequest {
  int64 deck_id = 1;
}

message ReviewOrder {
  repeated int64 card_ids = 1;
}

// exam_date_ms: unix millis (0 = unset); target_score: 472..528 (0 = unset).
message ExamProfile {
  int64 exam_date_ms = 1;
  uint32 target_score = 2;
}

message LeakageReport {
  uint32 total_items = 1;
  uint32 flagged = 2;
  repeated int64 flagged_item_ids = 3;
  bool clean = 4;
}

// Derived exam-anchored plan. study_mode is long_term | consolidation |
// maintenance.
message ExamPlan {
  bool has_profile = 1;
  int64 days_left = 2;
  uint32 current_readiness = 3;
  uint32 target_score = 4;
  bool on_track = 5;
  uint32 needed_points = 6;
  float points_per_week_needed = 7;
  string study_mode = 8;
  string recommended_tier = 9;
  bool readiness_sufficient = 10;
  string note = 11;
}

// One reliability-curve bucket: predictions falling in [lo, hi).
message CalibrationBin {
  float lo = 1;
  float hi = 2;
  uint32 count = 3;
  float mean_predicted = 4;
  float mean_outcome = 5;
}

message CalibrationReport {
  uint32 n = 1;
  float brier = 2;
  float log_loss = 3;
  bool sufficient = 4;
  string note = 5;
  repeated CalibrationBin bins = 6;
}

// The three separate scores plus the give-up state.
// memory/performance/coverage are 0..1; readiness is on the MCAT scale
// (472-528). `sufficient` is false when the give-up rule abstains.
message ReadinessSnapshot {
  float memory = 1;
  float performance = 2;
  float recall_perf_gap = 3;
  float coverage = 4;
  uint32 readiness_scaled = 5;
  uint32 low_scaled = 6;
  uint32 high_scaled = 7;
  bool sufficient = 8;
  string reason = 9;
  int64 computed_at_ms = 10;
  bool memory_sufficient = 11;
  bool performance_sufficient = 12;
  string blocking_dimension = 13;
}

message SrAttempts {
  repeated SrAttempt attempts = 1;
}

// Counts for the demo/sample-history seeder (0 = use the engine defaults).
message SeedSampleHistoryRequest {
  uint32 mature_cards = 1;
  uint32 exam_attempts = 2;
  uint32 srs_attempts = 3;
}

message SeedSampleHistoryResponse {
  uint32 cards_matured = 1;
  uint32 attempts_recorded = 2;
}

// One topic's raw signal counts. memory = mature_cards/review_cards and
// performance = exam_correct/exam_attempts are derived by the caller (with a
// per-topic evidence gate), matching how the global signals are computed.
message TopicSignal {
  string topic = 1;
  string label = 2;
  float weight = 3;
  // Notes tagged with this topic (the coverage basis).
  uint32 cards = 4;
  bool covered = 5;
  // Review-queue cards (type=2) whose note is tagged with this topic, and the
  // mature (ivl>=21) subset -- the memory signal's numerator/denominator.
  uint32 review_cards = 6;
  uint32 mature_cards = 7;
  // Exam-style attempts (question_type!=0) whose card is tagged with this
  // topic, and the correct subset -- the performance signal.
  uint32 exam_attempts = 8;
  uint32 exam_correct = 9;
}

message TopicSignalsReport {
  repeated TopicSignal topics = 1;
}
